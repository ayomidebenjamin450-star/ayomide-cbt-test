<!DOCTYPE html>
<html>
<head>
  <title>Ayomide CBT</title>

  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
    }

    h1 { text-align: center; }

    input, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: orange;
      cursor: pointer;
      font-weight: bold;
    }

    #examPage { display: none; }

    .question {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    #timer {
      text-align: right;
      font-size: 18px;
      color: yellow;
    }

    #result {
      text-align: center;
      font-size: 20px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginPage">
    <h1>Ayomide CBT Login</h1>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">

    <button onclick="sendCode()">Send Access Code</button>

    <input type="text" id="codeInput" placeholder="Enter Access Code">
    <button onclick="startExam()">Start Exam</button>
  </div>

  <!-- EXAM -->
  <div id="examPage">
    <div id="timer">Time: 10:00</div>
    <h2>Exam in Progress</h2>
    <div id="quiz"></div>
    <button onclick="submitTest()">Submit Exam</button>
    <div id="result"></div>
  </div>

</div>

<script>
emailjs.init("TF3gSXPfAdvbns_0b");

// Generate random code
let generatedCode = Math.floor(100000 + Math.random() * 900000);
let time = 600;

// Questions
const questions = [
  { question: "5 + 5 =", options: ["8","9","10","11"], answer: "10" },
  { question: "Capital of Nigeria?", options: ["Abuja","Lagos","Kano","Ibadan"], answer: "Abuja" },
  { question: "HTML is used for?", options: ["Styling","Structure","Database","Gaming"], answer: "Structure" }
];

// Send Email
function sendCode() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  if (!name || !email) {
    alert("Enter name and email");
    return;
  }

  emailjs.send("service_jh8wi98", "template_z5n5rds", {
    name: name,
    code: generatedCode,
    email: email
  }).then(() => {
    alert("Access code sent! Check your email.");
  }).catch((error) => {
    alert("Failed to send email");
    console.log(error);
  });
}

// Verify Code
function startExam() {
  let input = document.getElementById("codeInput").value;

  if (input != generatedCode) {
    alert("Invalid Access Code");
    return;
  }

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("examPage").style.display = "block";

  loadQuestions();
  startTimer();
}

// Load Questions
function loadQuestions() {
  const quiz = document.getElementById("quiz");

  questions.forEach((q, i) => {
    let html = `<div class="question"><p><b>${q.question}</b></p>`;

    q.options.forEach(opt => {
      html += `
        <label>
          <input type="radio" name="q${i}" value="${opt}">
          ${opt}
        </label><br>`;
    });

    html += `</div>`;
    quiz.innerHTML += html;
  });
}

// Timer
function startTimer() {
  let t = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
      `Time: ${m}:${s < 10 ? "0" : ""}${s}`;

    time--;

    if (time < 0) {
      clearInterval(t);
      submitTest();
    }
  }, 1000);
}

// Submit
function submitTest() {
  let score = 0;

  questions.forEach((q, i) => {
    let sel = document.querySelector(`input[name="q${i}"]:checked`);
    if (sel && sel.value === q.answer) score++;
  });

  let percent = Math.round((score / questions.length) * 100);

  document.getElementById("result").innerHTML =
    `Score: ${score}/${questions.length}<br>Percentage: ${percent}%`;
}
</script>

</body>
</html>
